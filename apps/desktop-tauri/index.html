<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Another Dimension Chat Prototype</title>
    <script type="module" src="/src/main.js"></script>
  </head>
  <body>
    <main class="shell">
      <section class="status-panel" aria-labelledby="app-title">
        <p class="eyebrow">Prototype shell only</p>
        <h1 id="app-title">Another Dimension Chat Prototype</h1>
        <dl id="status-list" class="status-list">
          <div>
            <dt>Secure release</dt>
            <dd id="secure-release">Not a secure release</dd>
          </div>
          <div>
            <dt>Messaging</dt>
            <dd id="messaging">Not available</dd>
          </div>
          <div>
            <dt>Profile</dt>
            <dd id="profile">Prototype boundary</dd>
          </div>
          <div>
            <dt>Pairing</dt>
            <dd id="pairing">Prototype boundary</dd>
          </div>
          <div>
            <dt>Transport</dt>
            <dd id="transport">Fail-closed only</dd>
          </div>
          <div>
            <dt>Storage</dt>
            <dd id="storage">Prototype boundary</dd>
          </div>
        </dl>
      </section>
    </main>
  </body>
</html>
