<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Another Dimension Chat Prototype</title>
    <script type="module" src="/src/main.js"></script>
  </head>
  <body>
    <main class="shell">
      <section class="status-panel" aria-labelledby="app-title">
        <p class="eyebrow">Prototype shell only</p>
        <h1 id="app-title">Another Dimension Chat Prototype</h1>
        <dl id="status-list" class="status-list">
          <div>
            <dt>Release claim</dt>
            <dd id="release-claim">No secure-release claim</dd>
          </div>
          <div>
            <dt>Messaging surface</dt>
            <dd id="messaging">Disabled in prototype</dd>
          </div>
          <div>
            <dt>Profile</dt>
            <dd id="profile">Profile boundary only</dd>
          </div>
          <div>
            <dt>Pairing</dt>
            <dd id="pairing">Pairing boundary only</dd>
          </div>
          <div>
            <dt>Transport</dt>
            <dd id="transport">Fail-closed boundary only</dd>
          </div>
          <div>
            <dt>Storage</dt>
            <dd id="storage">Storage boundary only</dd>
          </div>
          <div>
            <dt>Verification</dt>
            <dd id="verification">Lightweight checks only</dd>
          </div>
        </dl>
      </section>
    </main>
  </body>
</html>
