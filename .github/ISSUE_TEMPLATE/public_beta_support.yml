name: Unsigned public beta support
description: Report install, launch, checksum, or redacted diagnostics issues without private data.
title: "[public beta] "
labels:
  - public-beta
  - needs-triage
body:
  - type: markdown
    attributes:
      value: |
        Do not post bridge lines, onion endpoints, invite codes, pairing/envelope/endpoint payloads, safety phrases, profile names, message text, local paths, raw logs, crash dumps, passphrases, private keys, key material, private planning notes, files from docs/, or local app data.

        This beta is unsigned, not notarized, not audited, not production-ready, and sensitive communication prohibited.
  - type: checkboxes
    id: redaction
    attributes:
      label: Redaction checklist
      options:
        - label: I removed bridge lines, onion endpoints, invite codes, payloads, safety phrases, profile names, message text, local paths, raw logs, crash dumps, passphrases, private keys, and key material.
          required: true
        - label: I understand this is an unsigned experimental public beta and not safe for sensitive communication.
          required: true
  - type: input
    id: app_version
    attributes:
      label: App version
      placeholder: "0.1.0"
    validations:
      required: true
  - type: input
    id: build_channel
    attributes:
      label: Build channel
      placeholder: "beta-onion"
    validations:
      required: true
  - type: input
    id: build_commit
    attributes:
      label: Build commit
      placeholder: "copy from Public diagnostics if shown"
    validations:
      required: false
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - macOS Apple Silicon unsigned DMG
        - macOS install/checksum only
        - browser preview
        - source checkout
        - other redacted platform
    validations:
      required: true
  - type: input
    id: checksum_result
    attributes:
      label: Checksum result
      description: Report only pass/fail/not checked. Do not paste local paths.
      placeholder: "pass / fail / not checked"
    validations:
      required: true
  - type: input
    id: failure_class
    attributes:
      label: Failure class
      description: Copy the broad failure_class from Public diagnostics when available, or choose the closest class from PUBLIC_SUPPORT_TRIAGE.md.
      placeholder: "checksum-install-failure / macos-manual-allow / profile-locked / malformed-payload / replay-rejected / transport-unavailable / policy-blocked / lifecycle-confirmation-required / desktop-state-drift / unknown-redacted"
    validations:
      required: false
  - type: input
    id: recovery_next_action
    attributes:
      label: Recovery next action
      description: Copy the redacted recovery_next_action from Public diagnostics when available.
      placeholder: "verify-same-release-checksum / retry-passphrase / stay-on-manual-envelope"
    validations:
      required: false
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - checksum verification
        - macOS manual allow
        - app launch
        - profile unlock or create
        - invite room or verification
        - malformed payload or replay rejection
        - retry, cancel, or pending state drift
        - local deletion or lifecycle confirmation
        - public diagnostics copy
        - local room flow
        - explicit private delivery action
        - private security contact request
        - documentation
        - other redacted report
    validations:
      required: true
  - type: textarea
    id: public_diagnostics
    attributes:
      label: Public diagnostics only
      description: Paste only the app's Public diagnostics output. Do not paste field-test reports if they contain private data.
      placeholder: |
        Another Dimension Chat public beta diagnostics
        diagnostic_version=1
        release_channel=unsigned-experimental-public-beta
        security_claim=not-production-ready
        sensitive_communication=sensitive-communication-prohibited
        app_version=0.1.0
        build_channel=beta-onion
        failure_class=none
        recovery_next_action=none
        desktop_acceptance_status=not-claimed
        desktop_acceptance_blockers=none
        app_launch_network=false
        payload_boundary=status-build-failure-class-recovery-action-desktop-acceptance-only
        crash_upload=false
        telemetry=false
        raw_log_export=false
    validations:
      required: false
  - type: textarea
    id: description
    attributes:
      label: Redacted description
      description: Describe what happened without private identifiers, logs, payloads, paths, endpoints, messages, screenshots of private data, or secrets.
    validations:
      required: true
