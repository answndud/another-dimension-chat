name: Unsigned DMG primary public beta support
description: Report source-build install, launch, checksum, or redacted diagnostics issues without private data.
title: "[public beta] "
labels:
  - public-beta
  - needs-triage
body:
  - type: markdown
    attributes:
      value: |
        Do not post bridge lines, onion endpoints, invite codes, pairing/envelope/endpoint payloads, safety phrases, profile names, message text, local paths, raw logs, crash dumps, screenshots of private room data, support bundles, passphrases, private keys, key material, private planning notes, files from docs/, or local app data.

        Use only the same field set shown by the app's Public diagnostics:
        `allowed_public_intake_fields=app-status#app-version#build-channel#build-commit#platform#public-diagnostics#checksum-result#failure-class#recovery-next-action#desktop-acceptance-status#desktop-acceptance-blockers#app-launch-network#release-class-readiness#high-risk-runtime-evidence-source#high-risk-runtime-evidence-accepted#high-risk-runtime-primary-blocker#high-risk-runtime-failure-class#engine-sidecar-status-failure-class#engine-sidecar-manual-self-test-failure-class#engine-sidecar-redacted-runtime-status`
        `forbidden_public_intake_fields=raw-logs#crash-dumps#screenshots#onion-endpoints#endpoints#invite-codes#pairing-payloads#envelope-payloads#endpoint-payloads#message-text#local-paths#payloads#safety-phrases#profile-names#passphrases#private-keys#key-material#private-planning-notes#support-bundles`

        This beta uses an unsigned DMG primary path. A source-build alternate path and a legacy unsigned DMG fallback exist for explicit fallback use only. It is not signed, not notarized, not audited, not production-ready, and sensitive communication prohibited.

        Public GitHub issues are support triage only. They are not accepted representative usability evidence, not accepted production field evidence, and not High-Risk readiness evidence. Missing real-user evidence is tracked as `next_owner_action`, not as a local/source blocker.
  - type: checkboxes
    id: redaction
    attributes:
      label: Redaction checklist
      options:
        - label: I removed bridge lines, onion endpoints, invite codes, payloads, safety phrases, profile names, message text, local paths, raw logs, crash dumps, screenshots of private room data, support bundles, passphrases, private keys, and key material.
          required: true
        - label: I understand this is an unsigned DMG primary public beta with a source-build alternate path and a legacy unsigned DMG fallback and not safe for sensitive communication.
          required: true
        - label: I understand this public issue is not accepted usability, field, production, or High-Risk evidence.
          required: true
  - type: input
    id: app_version
    attributes:
      label: App version
      placeholder: "0.1.0"
    validations:
      required: true
  - type: input
    id: build_channel
    attributes:
      label: Build channel
      placeholder: "beta-onion"
    validations:
      required: true
  - type: input
    id: build_commit
    attributes:
      label: Build commit
      placeholder: "copy from Public diagnostics if shown"
    validations:
      required: false
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - macOS unsigned DMG
        - macOS unsigned DMG fallback
        - browser preview
        - source checkout
        - other redacted platform
    validations:
      required: true
  - type: input
    id: checksum_result
    attributes:
      label: Checksum result
      description: Report only pass/fail/not checked. Do not include local paths.
      placeholder: "pass / fail / not checked"
    validations:
      required: true
  - type: input
    id: failure_class
    attributes:
      label: Failure class
      description: Copy the broad failure_class from Public diagnostics when available, or choose the closest class from PUBLIC_SUPPORT_TRIAGE.md.
      placeholder: "checksum-install-failure / macos-manual-allow / profile-locked / malformed-payload / replay-rejected / transport-unavailable / policy-blocked / lifecycle-confirmation-required / desktop-state-drift / unknown-redacted"
    validations:
      required: false
  - type: input
    id: recovery_next_action
    attributes:
      label: Recovery next action
      description: Copy the redacted recovery_next_action from Public diagnostics when available.
      placeholder: "verify-same-release-checksum / retry-passphrase / stay-on-manual-envelope"
    validations:
      required: false
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - checksum verification
        - macOS manual allow
        - app launch
        - profile unlock or create
        - invite room or verification
        - malformed payload or replay rejection
        - retry, cancel, or pending state drift
        - local deletion or lifecycle confirmation
        - public diagnostics copy
        - local room flow
        - explicit private delivery action
        - private security contact request
        - documentation
        - other redacted report
    validations:
      required: true
  - type: textarea
    id: public_diagnostics
    attributes:
      label: Public diagnostics only
      description: Copy only the app's redacted Public diagnostics output. Do not include field-test reports if they contain private data.
      placeholder: |
        Another Dimension Chat public support diagnostics
        diagnostic_version=2
        diagnostic_scope=public-support
        public_intake_policy_version=public-intake-v1
        public_intake_policy_alignment=app-diagnostics#github-issue-template#security-policy
        public_intake_policy_fields_aligned=true
        app_version=0.1.0
        build_channel=beta-onion
        build_commit=806ecad1
        allowed_public_intake_fields=app-status#app-version#build-channel#build-commit#platform#public-diagnostics#checksum-result#failure-class#recovery-next-action#desktop-acceptance-status#desktop-acceptance-blockers#app-launch-network#release-class-readiness#high-risk-runtime-evidence-source#high-risk-runtime-evidence-accepted#high-risk-runtime-primary-blocker#high-risk-runtime-failure-class#engine-sidecar-status-failure-class#engine-sidecar-manual-self-test-failure-class#engine-sidecar-redacted-runtime-status
        forbidden_public_intake_fields=raw-logs#crash-dumps#screenshots#onion-endpoints#endpoints#invite-codes#pairing-payloads#envelope-payloads#endpoint-payloads#message-text#local-paths#payloads#safety-phrases#profile-names#passphrases#private-keys#key-material#private-planning-notes#support-bundles
        failure_class=none
        recovery_next_action=none
        desktop_acceptance_status=not-claimed
        desktop_acceptance_blockers=none
        app_launch_network=false
        high_risk_runtime_evidence_source=absent
        high_risk_runtime_evidence_accepted=false
        high_risk_runtime_primary_blocker=high-risk-transport-runtime
        high_risk_runtime_failure_class=runtime-evidence-missing
        engine_sidecar_status_failure_class=none
        engine_sidecar_manual_self_test_failure_class=none
        engine_sidecar_redacted_runtime_status=redacted
        public_issue_evidence_class=support-triage-only
        accepted_usability_evidence=false
        accepted_field_evidence=false
        accepted_high_risk_evidence=false
        payload_boundary=status-build-failure-class-recovery-action-desktop-acceptance-only
        crash_upload=false
        telemetry=false
        raw_log_export=false
    validations:
      required: false
  - type: textarea
    id: description
    attributes:
      label: Redacted description
      description: Describe what happened without private identifiers, logs, crash artifacts, support bundles, payloads, paths, endpoints, messages, screenshots of private data, or secrets.
    validations:
      required: true
