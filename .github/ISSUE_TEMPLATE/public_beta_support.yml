name: Unsigned public beta support
description: Report install, launch, checksum, or redacted diagnostics issues without private data.
title: "[public beta] "
labels:
  - public-beta
  - needs-triage
body:
  - type: markdown
    attributes:
      value: |
        Do not post bridge lines, onion endpoints, invite codes, pairing/envelope/endpoint payloads, safety phrases, profile names, message text, local paths, raw logs, crash dumps, passphrases, private keys, key material, private planning notes, files from docs/, or local app data.

        This beta is unsigned, not notarized, not audited, not production-ready, and sensitive communication prohibited.
  - type: checkboxes
    id: redaction
    attributes:
      label: Redaction checklist
      options:
        - label: I removed bridge lines, onion endpoints, invite codes, payloads, safety phrases, profile names, message text, local paths, raw logs, crash dumps, passphrases, private keys, and key material.
          required: true
        - label: I understand this is an unsigned experimental public beta and not safe for sensitive communication.
          required: true
  - type: input
    id: app_version
    attributes:
      label: App version
      placeholder: "0.1.0"
    validations:
      required: true
  - type: input
    id: build_channel
    attributes:
      label: Build channel
      placeholder: "beta-onion"
    validations:
      required: true
  - type: input
    id: build_commit
    attributes:
      label: Build commit
      placeholder: "806ecad1"
    validations:
      required: false
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - checksum verification
        - macOS manual allow
        - app launch
        - public diagnostics copy
        - local room flow
        - explicit private delivery action
        - documentation
        - other redacted report
    validations:
      required: true
  - type: textarea
    id: public_diagnostics
    attributes:
      label: Public diagnostics only
      description: Paste only the app's Public diagnostics output. Do not paste field-test reports if they contain private data.
      placeholder: |
        Another Dimension Chat public beta diagnostics
        diagnostic_version=1
        release_channel=unsigned-experimental-public-beta
        security_claim=not-production-ready
        sensitive_communication=sensitive-communication-prohibited
        app_version=0.1.0
        build_channel=beta-onion
        failure_class=none
        app_launch_network=false
        payload_boundary=status-build-failure-class-only
        crash_upload=false
        telemetry=false
        raw_log_export=false
    validations:
      required: false
  - type: textarea
    id: description
    attributes:
      label: Redacted description
      description: Describe what happened without private identifiers, logs, payloads, paths, endpoints, messages, screenshots of private data, or secrets.
    validations:
      required: true
