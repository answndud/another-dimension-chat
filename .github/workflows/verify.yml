name: Verify

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    name: Lightweight verification
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Install Linux Tauri dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libayatana-appindicator3-dev \
            libglib2.0-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libwebkit2gtk-4.1-dev \
            pkg-config

      - name: Install frontend dependencies
        run: npm ci --prefix apps/desktop-tauri

      - name: Verify
        run: scripts/verify_all.sh
