name: Verify

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    name: Rust workspace verification
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Verify
        run: scripts/verify_all.sh
